query MPGATransactions(
  $fundTypes: [String!]
  $startMonth: ISO8601Date
  $endMonth: ISO8601Date
) {
  reportsStaffExpenses(
    fundTypes: $fundTypes
    startMonth: $startMonth
    endMonth: $endMonth
  ) {
    transactionYears
    funds {
      categories {
        averagePerMonth
        breakdownByMonth {
          month
          total
        }
        category
        subcategories {
          averagePerMonth
          breakdownByMonth {
            month
            total
            transactions {
              id
              amount
              transactedAt
              description
            }
          }
          subCategory
          total
        }
        total
      }
      fundType
      total
    }
  }
}
