query GetFourteenMonthReport($accountListId: ID!, $range: String) {
  reportsSalaryCurrencyDonations(accountListId: $accountListId, range: $range) {
    currencyGroups
    defaultCurrency
    donorInfos {
      accountNumbers
      contactId
      contactName
      lateBy30Days
      lateBy60Days
      pledgeAmount
      pledgeCurrency
      pledgeFrequency
      status
    }
    months
    accountList {
      id
      createdAt
      updatedAt
    }
  }

  reportsDonorCurrencyDonations(accountListId: $accountListId, range: $range) {
    currencyGroups
    defaultCurrency
    donorInfos {
      accountNumbers
      contactId
      contactName
      lateBy30Days
      lateBy60Days
      pledgeAmount
      pledgeCurrency
      pledgeFrequency
      status
    }
    months
    accountList {
      id
      createdAt
      updatedAt
    }
  }
}

query FourteenMonthReport(
  $accountListId: ID!
  $designationAccountIds: [ID!]
  $currencyType: FourteenMonthReportCurrencyType!
) {
  fourteenMonthReport(
    accountListId: $accountListId
    designationAccountId: $designationAccountIds
    currencyType: $currencyType
  ) {
    currencyType
    salaryCurrency
    currencyGroups {
      currency
      totals {
        year
        months {
          month
          total
        }
        average
        minimum
      }
      contacts {
        ...FourteenMonthReportContact
      }
    }
  }
}

fragment FourteenMonthReportContact on FourteenMonthReportContact {
  id
  name
  total
  average
  minimum
  completeMonthsTotal
  months {
    month
    total
    donations {
      amount
      currency
      date
      paymentMethod
    }
  }
  accountNumbers
  lateBy30Days
  lateBy60Days
  pledgeAmount
  pledgeCurrency
  pledgeFrequency
  status
}
