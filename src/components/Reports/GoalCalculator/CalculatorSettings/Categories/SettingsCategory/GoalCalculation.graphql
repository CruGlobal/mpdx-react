query GoalCalculation($accountListId: ID!, $goalCalculationId: ID!) {
  goalCalculation(accountListId: $accountListId, id: $goalCalculationId) {
    name
  }
}

mutation UpdateGoalCalculation($input: GoalCalculationUpdateMutationInput!) {
  updateGoalCalculation(input: $input) {
    goalCalculation {
      id
      name
    }
  }
}
