query LandingSalaryCalculations {
  latestCalculation: latestSalaryRequest(
    status: [IN_PROGRESS, PENDING, ACTION_REQUIRED]
  ) {
    id
    status
    salary
    spouseSalary
    mhaAmount
    spouseMhaAmount
    submittedAt
    changesRequestedAt
    feedback
  }
  inProgressCalculation: latestSalaryRequest(status: [IN_PROGRESS]) {
    id
  }
  effectiveCalculation: effectiveSalaryRequest {
    id
    salary
    spouseSalary
    calculations {
      effectiveCap
    }
    spouseCalculations {
      effectiveCap
    }
  }
}

mutation CreateSalaryCalculation($input: SalaryRequestCreateMutationInput!) {
  createSalaryRequest(input: $input) {
    salaryRequest {
      id
    }
  }
}
