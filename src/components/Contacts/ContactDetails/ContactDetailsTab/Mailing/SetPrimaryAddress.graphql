mutation SetContactPrimaryAddress(
  $accountListId: ID!
  $contactId: ID!
  $primaryAddressId: String
) {
  updateContact(
    input: {
      accountListId: $accountListId
      attributes: { id: $contactId, primaryAddressId: $primaryAddressId }
    }
  ) {
    contact {
      id
      primaryAddress {
        id
      }
      addresses(first: 25) {
        nodes {
          id
          primaryMailingAddress
        }
      }
    }
  }
}
