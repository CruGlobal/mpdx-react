fragment PdsGoalCalculationFields on DesignationSupportCalculation {
  id
  name
  updatedAt
  averageHoursPerWeek
  hoursWorkedPerWeek
  salaryOrHourly
  status
  payRate
  benefits
  geographicLocation
  ministryCellPhone
  ministryInternet
  mpdNewsletter
  mpdMiscellaneous
  accountTransfers
  otherMonthlyReimbursements
  conferenceRetreatCosts
  ministryTravelMeals
  otherAnnualReimbursements
  designationSupportHoursItems {
    id
    hoursPerWeek
    numberOfWeeks
    name
    label
    position
    predefined
  }
}

query PdsGoalCalculations($after: String) {
  designationSupportCalculations(after: $after) {
    nodes {
      ...PdsGoalCalculationFields
    }
    pageInfo {
      endCursor
      hasNextPage
    }
  }
}

query PdsGoalCalculation($id: ID!) {
  designationSupportCalculation(id: $id) {
    ...PdsGoalCalculationFields
  }
}

mutation CreatePdsGoalCalculation(
  $attributes: DesignationSupportCalculationCreateInput
) {
  createDesignationSupportCalculation(input: { attributes: $attributes }) {
    designationSupportCalculation {
      ...PdsGoalCalculationFields
    }
  }
}

mutation DeletePdsGoalCalculation($id: ID!) {
  deleteDesignationSupportCalculation(input: { id: $id }) {
    id
  }
}

mutation UpdatePdsGoalCalculation(
  $attributes: DesignationSupportCalculationUpdateInput!
) {
  updateDesignationSupportCalculation(input: { attributes: $attributes }) {
    designationSupportCalculation {
      ...PdsGoalCalculationFields
    }
  }
}

mutation CreateDesignationSupportHoursItem(
  $attributes: DesignationSupportHoursItemCreateInput!
) {
  createDesignationSupportHoursItem(input: { attributes: $attributes }) {
    designationSupportHoursItem {
      id
      hoursPerWeek
      numberOfWeeks
      name
      label
      position
      predefined
    }
  }
}

mutation UpdateDesignationSupportHoursItem(
  $attributes: DesignationSupportHoursItemUpdateInput!
) {
  updateDesignationSupportHoursItem(input: { attributes: $attributes }) {
    designationSupportHoursItem {
      id
      hoursPerWeek
      numberOfWeeks
      name
      label
      position
      predefined
    }
  }
}
