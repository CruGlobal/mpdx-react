query Hcm($effectiveDate: ISO8601Date) {
  hcm(effectiveDate: $effectiveDate) {
    staffInfo {
      id
      preferredName
      firstName
      lastName
      personNumber
      emailAddress
      primaryPhoneNumber
      age
      addressLine1
      addressLine2
      city
      country
      state
      zipCode
      dependentChildrenWithHealthcareBenefits
      isInternational
      secaStatus
      tenure
      peopleGroupSupportType
      userPersonType
      assignmentStatus
      assignmentCategory
    }
    currentSalary {
      grossSalaryAmount
      lastRegularPaymentDate
      lastUpdated
    }
    exceptionSalaryCap {
      amount
      effectiveDate
      boardCapException
    }
    fourOThreeB {
      currentRothContributionPercentage
      currentTaxDeferredContributionPercentage
      maximumContributionLimit
    }
    mhaEit {
      mhaEligibility
    }
    asrEit {
      asrEligibility
      ineligibilityReason
    }
    mhaRequest {
      currentApprovedOverallAmount
      currentTakenAmount
    }
    salaryRequestEligible
  }
}
