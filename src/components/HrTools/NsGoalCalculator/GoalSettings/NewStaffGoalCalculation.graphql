fragment NewStaffGoalCalculationFields on NewStaffGoalCalculation {
  id
  # Computed goal-calculation worksheet
  calculations {
    salary
    seca
    salarySubtotal
    contributing403bAmount
    spouseContributing403bAmount
    totalContributing403bAmount
    totalMinistryExpenses
    medicalExpenses
    staffConferenceTransfer
    accountTransfers
    advocacyTransfers
    otherExpenses
    totalSalary
    ministryMiles
    travel
    conferences
    meals
    mpd
    supplies
    benefitsCharge
    goalSubtotal
    subtotalWithAdminCharge
    adminCharge
    attrition
    monthlyGoal
    supportRaised
    minimumAccountBalance
    secaRate
    adminRate
    attritionRate
    default403bFraction
  }

  # Identity (read-only display in the header; prepopulated from HCM).
  firstName
  lastName
  emailAddress
  phoneNumber
  address
  personNumber
  spouseFirstName
  spouseEmailAddress
  spousePhoneNumber
  spousePersonNumber

  # Personal
  joinedStaffYear
  maritalStatus
  spouseJoining
  age
  spouseAge
  tenure
  spouseTenure

  # Financial
  annualRequestedSalary
  spouseRequestedAnnualSalary
  contribution403bPercentage
  spouseContribution403bPercentage
  spouseMhaAmount
  staffConferenceTransfer
  accountTransfers
  advocacyTransfers
  geographicLocation
  studentLoanMonthlyPayment
  carLoanMonthlyPayment
  creditCardDebtMonthlyPayment
  solidSupportRaised

  # Healthcare
  benefitsPlan
  reimbursableExpenses
  healthcareDependentsCount

  # Ministry
  ministryName
  ministryLocation
  assignmentType
  ministryExpenses

  # NSO
  nsoHousing
  nsoSessions
  nsoSpecialNeedsSupportReceived
  childcareChildrenCount

  # Exemptions
  healthcareExempt
  spouseHealthcareExempt
  secaExempt
  spouseSecaExempt
  allowSalaryOverCap
  allowDebtOverCap

  # Calculation year-versioned constants set
  calculationsYear
}

query NewStaffGoalCalculation($accountListId: ID, $id: ID) {
  newStaffGoalCalculation(accountListId: $accountListId, id: $id) {
    ...NewStaffGoalCalculationFields
  }
}

mutation UpdateNewStaffGoalCalculation(
  $input: NewStaffGoalCalculationUpdateMutationInput!
) {
  updateNewStaffGoalCalculation(input: $input) {
    newStaffGoalCalculation {
      ...NewStaffGoalCalculationFields
    }
  }
}

# Recalculate the goal for a set of unsaved changes
mutation PreviewNewStaffGoalCalculation(
  $input: NewStaffGoalCalculationPreviewMutationInput!
) {
  previewNewStaffGoalCalculation(input: $input) {
    newStaffGoalCalculation {
      id
      calculations {
        monthlyGoal
      }
    }
  }
}
