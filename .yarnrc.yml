cacheMigrationMode: required-only

compressionLevel: mixed

enableGlobalCache: false

enableScripts: true

supportedArchitectures:
  cpu:
    - x64
    - arm64
    - x86
  libc:
    - glibc
    - musl
  os:
    - linux
    - darwin
    - win32

yarnPath: .yarn/releases/yarn-4.14.1.cjs

nodeLinker: node-modules
