fragment NewStaffInformationFields on NewStaffQuestionnaire {
  id
  address
  age
  firstName
  lastName
  maritalStatus
  personNumber
  spouseAge
  spouseFirstName
  spouseJoining
  spousePersonNumber
  spouseTenure
  tenure
  variant
}

fragment NewStaffQuestionnaireFields on NewStaffQuestionnaire {
  id
  updatedAt
  accountTransfers
  assignmentType
  carLoanMonthlyPayment
  childcareChildrenCount
  creditCardDebtMonthlyPayment
  geographicLocation
  healthcareDependentsCount
  ministryLocation
  ministryName
  nsoHousing
  nsoSessions
  nsoSpecialNeedsSupportReceived
  phoneNumber
  solidSupportRaised
  spouseContribution403bPercentage
  spouseMhaAmount
  spousePhoneNumber
  spouseRequestedAnnualSalary
  staffConferenceTransfer
  studentLoanMonthlyPayment
}

query NewStaffQuestionnaire($accountListId: ID!) {
  newStaffQuestionnaire(accountListId: $accountListId) {
    ...NewStaffInformationFields
    ...NewStaffQuestionnaireFields
  }
}
