fragment DonorInfo on DonorInfo {
  accountNumbers
  contactId
  contactName
  lateBy30Days
  lateBy60Days
  pledgeAmount
  pledgeCurrency
  pledgeFrequency
  status
}

fragment accountList on AccountList {
  id
  createdAt
  updatedAt
}

query GetFourteenMonthReport(
  $accountListId: ID!
  $range: String
  $donorAccountId: [ID!]
  $designationAccountId: [ID!]
) {
  reportsSalaryCurrencyDonations(
    accountListId: $accountListId
    range: $range
    donorAccountId: $donorAccountId
    designationAccountId: $designationAccountId
  ) {
    currencyGroups
    defaultCurrency
    donorInfos {
      ...DonorInfo
    }
    months
    accountList {
      ...accountList
    }
  }

  reportsDonorCurrencyDonations(
    accountListId: $accountListId
    range: $range
    donorAccountId: $donorAccountId
    designationAccountId: $designationAccountId
  ) {
    currencyGroups
    defaultCurrency
    donorInfos {
      ...DonorInfo
    }
    months
    accountList {
      ...accountList
    }
  }
}
