fragment ListGoalCalculation on GoalCalculation {
  id
  name
  readOnly
  role
  familySize
  benefitsPlan
  netPaycheckAmount
  spouseNetPaycheckAmount
  taxesPercentage
  spouseTaxesPercentage
  rothContributionPercentage
  spouseRothContributionPercentage
  traditionalContributionPercentage
  spouseTraditionalContributionPercentage
  updatedAt
  householdFamily {
    ...BudgetFamily
  }
  ministryFamily {
    ...BudgetFamily
  }
  specialFamily {
    ...BudgetFamily
  }
}

query GoalCalculations($accountListId: ID!, $after: String) {
  goalCalculations(accountListId: $accountListId, after: $after) {
    nodes {
      ...ListGoalCalculation
    }
    pageInfo {
      endCursor
      hasNextPage
    }
  }
}

mutation CreateGoalCalculation($accountListId: ID!) {
  createGoalCalculation(input: { accountListId: $accountListId }) {
    goalCalculation {
      ...ListGoalCalculation
    }
  }
}

mutation DeleteGoalCalculation($accountListId: ID!, $id: ID!) {
  deleteGoalCalculation(input: { accountListId: $accountListId, id: $id }) {
    id
  }
}
