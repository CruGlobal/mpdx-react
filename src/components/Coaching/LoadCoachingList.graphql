query LoadCoachingList($after: String) {
  coachingAccountLists(first: 25, after: $after) {
    nodes {
      ...CoachedPerson
    }
    totalCount
    totalPageCount
    pageInfo {
      startCursor
      endCursor
      hasNextPage
      hasPreviousPage
    }
  }
}

fragment CoachedPerson on CoachingAccountList {
  id
  name
  primaryAppeal {
    active
    amount
    amountCurrency
    id
    name
    pledgesAmountNotReceivedNotProcessed
    pledgesAmountReceivedNotProcessed
    pledgesAmountProcessed
  }
  users {
    nodes {
      firstName
      lastName
      id
    }
  }
  currency
  monthlyGoal
  balance
  receivedPledges
  totalPledges
}
