fragment DonorInfo on DonorInfo {
  accountNumbers
  contactId
  contactName
  lateBy30Days
  lateBy60Days
  pledgeAmount
  pledgeCurrency
  pledgeFrequency
  status
}

query GetFourteenMonthReport($accountListId: ID!, $range: String, $donorAccountId: [ID!], $designationAccountId: [ID!]) {
  reportsSalaryCurrencyDonations(accountListId: $accountListId, range: $range, donorAccountId: $donorAccountId, designationAccountId: $designationAccountId) {
    currencyGroups
    defaultCurrency
    donorInfos {
      ...DonorInfo
    }
    months
    accountList {
      id
      createdAt
      updatedAt
    }
  }

  reportsDonorCurrencyDonations(accountListId: $accountListId, range: $range, donorAccountId: $donorAccountId, designationAccountId: $designationAccountId) {
    currencyGroups
    defaultCurrency
    donorInfos {
      ...DonorInfo
    }
    months
    accountList {
      id
      createdAt
      updatedAt
    }
  }
}
