query MinistryPartnerReminders(
  $accountListId: ID!
  $designationNumber: String!
) {
  ministryPartnerReminders(
    accountListId: $accountListId
    designationNumber: $designationNumber
  ) {
    id
    designationId
    donorName
    donorId
    donorAccountNumber
    lastGiftDate
    lastReminderDate
    frequency
  }
}

query DesignationAccounts($accountListId: ID!) {
  designationAccounts(accountListId: $accountListId) {
    organizationName
    designationAccounts {
      designationNumber
      id
      name
    }
  }
}
