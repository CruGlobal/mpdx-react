# These are all the fields that should be loaded for salary requests and that should be reload when
# salary requests
fragment SalaryRequestFields on SalaryRequest {
  effectiveDate
  location
  mhaAmount
  spouseMhaAmount
  salaryCap
  spouseSalaryCap
  salary
  spouseSalary
  status
  additionalInfo
  phoneNumber
  emailAddress
  submittedAt
  updatedAt
  splitCapRequired
  calculations {
    ...CalculationFields
  }
  spouseCalculations {
    ...CalculationFields
  }
  progressiveApprovalTier {
    id
    tier
    approver
    approvalTimeframe
  }
}

fragment CalculationFields on SalaryRequestCalculations {
  annualBase
  additionalSalary
  individualMultiplier
  geographicAdjustment
  geographicMultiplier
  tenureAdjustment
  oldSalaryCap
  oldSecaAmount
  secaEstimatedFraction
  capWithSeca
  contributing403bFraction
  non403bFraction
  calculatedCap
  effectiveCap
  individualCap
  familyCap
  hardCap
  exceptionCap
  combinedCap
  minimumRequiredSalary
  minimumRequestedSalary
  requestedSeca
  requestedWithSeca
  requestedGross
  requestedAboveMinimum
  requestedMha
  requestedAboveMha
  taxableCompensation
  contributing403bAmount
  contributingTaxDeferredAmount
  contributingRothAmount
  annualCompensation
}

query SalaryCalculation {
  salaryRequest: latestSalaryRequest(status: [IN_PROGRESS]) {
    id
    ...SalaryRequestFields
  }
}

query ApprovedSalaryCalculation {
  salaryRequest: latestSalaryRequest(status: [APPROVED]) {
    id
    mhaAmount
    spouseMhaAmount
    salaryCap
    spouseSalaryCap
    salary
    spouseSalary

    calculations {
      contributing403bFraction
    }
    spouseCalculations {
      contributing403bFraction
    }
  }
}
