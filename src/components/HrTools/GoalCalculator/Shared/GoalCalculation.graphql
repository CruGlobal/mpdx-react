fragment GoalCalculationSettings on GoalCalculation {
  name
  firstName
  spouseFirstName
  lastName
  geographicLocation
  ministryLocation
  role
  familySize
  benefitsPlan
  yearsOnStaff
  spouseYearsOnStaff
  age
  spouseAge
  childrenNamesAges
  netPaycheckAmount
  spouseNetPaycheckAmount
  taxesPercentage
  spouseTaxesPercentage
  secaExempt
  spouseSecaExempt
  rothContributionPercentage
  spouseRothContributionPercentage
  traditionalContributionPercentage
  spouseTraditionalContributionPercentage
  mhaAmount
  spouseMhaAmount
  newStaffCalculations {
    ...NewStaffReferenceGoal
  }
}

fragment NewStaffReferenceGoal on NewStaffGoalCalculationCalculations {
  salary
  secaRate
  seca
  salarySubtotal
  contribution403bPercentage
  totalContributing403bAmount
  totalSalary
  ministryMiles
  travel
  conferences
  meals
  mpd
  supplies
  totalMinistryExpenses
  benefitsCharge
  medicalExpenses
  goalSubtotal
  adminRate
  subtotalWithAdminCharge
  attritionRate
  attrition
  monthlyGoal
  supportRaised
}

fragment BudgetFamily on BudgetFamily {
  id
  label
  category
  directInput
  updatedAt
  primaryBudgetCategories {
    id
    label
    category
    directInput
    updatedAt
    subBudgetCategories {
      id
      label
      category
      amount
      updatedAt
    }
  }
}

query GoalCalculation($accountListId: ID!, $id: ID!) {
  goalCalculation(accountListId: $accountListId, id: $id) {
    id
    primary
    ...GoalCalculationSettings
    updatedAt
    ministryFamily {
      ...BudgetFamily
    }
    householdFamily {
      ...BudgetFamily
    }
    specialFamily {
      ...BudgetFamily
    }
  }
}
